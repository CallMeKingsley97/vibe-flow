name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "要发布的已有标签（如 v0.1.0）；留空则使用触发 ref"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag != '' && github.event.inputs.tag || github.ref }}
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 10.13.1
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - name: Validate required updater secrets
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          test -n "$TAURI_SIGNING_PRIVATE_KEY"
          test -n "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD"
      - run: pnpm install --frozen-lockfile
      - name: Validate updater signing key
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          cp package.json /tmp/vibe-flow-signing-probe.json
          pnpm tauri signer sign /tmp/vibe-flow-signing-probe.json
      - run: pnpm release:check
      - name: Resolve version and tag
        id: meta
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="v${VERSION}"
          fi
          if [ "${TAG#v}" != "${VERSION}" ]; then
            echo "Tag ${TAG} does not match package version ${VERSION}"
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Resolved release tag=${TAG} version=${VERSION}"
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - run: pnpm build:inspect
      - run: cargo test --manifest-path src-tauri/Cargo.toml

  create-release:
    needs: validate
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.id }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate.outputs.tag }}
      - name: Create or reuse draft release
        id: create
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.validate.outputs.tag }}
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release ${TAG} already exists; reusing it."
            # 确保仍是 draft，避免误发布
            gh release edit "$TAG" --draft=true >/dev/null
          else
            gh release create "$TAG" \
              --draft \
              --title "Vibe Flow v${VERSION}" \
              --notes-file RELEASE_NOTES.md
          fi
          RID="$(gh release view "$TAG" --json databaseId -q .databaseId)"
          test -n "$RID"
          echo "id=${RID}" >> "$GITHUB_OUTPUT"
          echo "Using release id=${RID} for tag=${TAG}"

  publish:
    needs: [validate, create-release]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14
            args: --target universal-apple-darwin
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-2022
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate.outputs.tag }}
      - uses: pnpm/action-setup@v4
        with:
          version: 10.13.1
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - name: Install universal macOS targets
        if: runner.os == 'macOS'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - run: pnpm install --frozen-lockfile
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ needs.validate.outputs.tag }}
          releaseId: ${{ needs.create-release.outputs.release_id }}
          releaseName: Vibe Flow v${{ needs.validate.outputs.version }}
          releaseBody: See RELEASE_NOTES.md and the attached installers.
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}

  verify-release:
    needs: [validate, create-release, publish]
    runs-on: ubuntu-latest
    steps:
      - name: Verify draft release has installer assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ needs.validate.outputs.tag }}
        run: |
          set -euo pipefail
          # 本 job 不 checkout 代码，必须显式指定仓库，避免 gh 依赖本地 .git
          gh release view "$TAG" --repo "$GH_REPO" --json isDraft,assets,url > /tmp/release.json
          cat /tmp/release.json
          IS_DRAFT="$(jq -r .isDraft /tmp/release.json)"
          COUNT="$(jq '.assets | length' /tmp/release.json)"
          URL="$(jq -r .url /tmp/release.json)"
          if [ "$IS_DRAFT" != "true" ]; then
            echo "Expected draft release, got isDraft=${IS_DRAFT}"
            exit 1
          fi
          if [ "$COUNT" -lt 3 ]; then
            echo "Expected at least 3 release assets, got ${COUNT}"
            jq '.assets[].name' /tmp/release.json || true
            exit 1
          fi
          echo "Draft release asset names:"
          jq -r '.assets[].name' /tmp/release.json
          echo "Draft release OK with ${COUNT} assets: ${URL}"
